name: commercial_solvers
description: Set up commercial solvers in CI for testing purposes
inputs:
  token:
    description: GitHub token with access to the private repo
    required: true
  skip_onnxruntime:
    description: Skip the ONNX Runtime download (python builds get it from pip onnxruntime instead)
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - run: echo "$RUNNER_OS-$RUNNER_ARCH"
      shell: bash
    - uses: jgillis/variable-mapper@codex/bump-runtime-node24
      with:
        key: "${{runner.os}}-${{runner.arch}}"
        map: |
         {
            "Linux-X64": {"knitro": "knitro-13.2.0-Linux-64", "knitro_suffix": ".tar.gz", "cplex": "cos_installer_preview-22.1.1.0.R0-M08SWML-linux-x86-64", "cplex_suffix": ".bin", "gurobi": "gurobi10.0.1_linux64.tar.gz", "hsl": "hsl-manylinux2014-x64", "bqpd": "bqpd-manylinux2014-x64", "worhp": "worhp_1.15_ubuntu2004", "snopt": "libsnopt7c_linux", "mosek": "mosektoolslinux64x86", "mosek_suffix": ".tar.bz2", "mosek_platform": "linux64x86", "xpress": "xpress_linux", "onnxruntime": "onnxruntime-linux-x64-1.22.0", "onnxruntime_ext": "tgz"},
            "Windows-X64": {"knitro": "knitro-13.2.0-Win64", "knitro_suffix": ".zip", "cplex": "cplex2211_win64", "cplex_suffix": ".zip", "gurobi": "Gurobi-10.0.1-win64.msi", "hsl": "hsl-windows-shared-x64-posix", "bqpd": "bqpd-windows-shared-x64-posix", "worhp": "worhp_1.15-0_win64", "snopt": "libsnopt7_win", "mosek": "mosek", "mosek_suffix": ".zip", "mosek_platform": "win64x86", "onnxruntime": "onnxruntime-win-x64-1.22.0", "onnxruntime_ext": "zip"},
            "macOS-X64": {"knitro": "knitro-13.2.0-MacOS-64", "knitro_suffix": ".tar.gz", "cplex": "cos_installer_preview-22.1.1.0.R0-M08SXML-osx", "cplex_suffix": ".zip", "gurobi": "gurobi10.0.1_macos_universal2.pkg", "hsl": "hsl-macos-11", "bqpd": "bqpd-macos-11", "snopt": "libsnopt7c_mac", "xpress": "xpress_mac_intel"},
            "macOS-ARM64": {"knitro": "knitro-13.2.0-MacOS-ARM", "knitro_suffix": ".tar.gz", "cplex": "cos_installer_preview-22.1.1.0.R0-M08WYML-osx-arm64", "cplex_suffix": ".zip", "gurobi": "gurobi10.0.1_macos_universal2.pkg", "hsl": "hsl-macos-m1", "bqpd": "bqpd-macos-m1", "snopt": "libsnopt7c_mac", "mosek": "mosektoolsosxaarch64", "mosek_suffix": ".tar.bz2", "mosek_platform": "osxaarch64", "xpress": "xpress_mac_arm", "onnxruntime": "onnxruntime-osx-arm64-1.22.0", "onnxruntime_ext": "tgz"}
         }
        export_to: env
    # Download protected release asset
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.knitro}}${{env.knitro_suffix}}
        token: ${{ inputs.token }}
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: 'artelys_lic_8325_casadi_2023-11-02.txt'
        token: ${{ inputs.token }}
    - run: tar -xzf ${{env.knitro}}.tar.gz -C $RUNNER_TEMP
      shell: bash
      if: runner.os != 'Windows'
    - run: unzip -q ${{env.knitro}}.zip -d $RUNNER_TEMP
      shell: bash
      if: runner.os == 'Windows'
    - run: cp artelys_lic_8325_casadi_2023-11-02.txt $RUNNER_TEMP
      shell: bash
      
    # Add to PATH
    - run: |
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/${{env.knitro}}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        # Leads to `MATLAB: detail/MvmLocalBoundMethods.cpp:112: static void mvm::detail::MvmLocalBoundMethods::initMethods(bool): Assertion `Failed to open local mvm library: /usr/local/MATLAB/R2023a/bin/glnxa64/libmwgraphblas.so.7: undefined symbol: GOMP_loop_nonmonotonic_dynamic_start, version VERSION' failed.`
        # But needed for
        echo "LD_PRELOAD=$RUNNER_TEMP/${{env.knitro}}/lib/libiomp5.so" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash
    - run: |
        if [ ! -d "/usr/local/lib" ]; then
          sudo mkdir -p /usr/local/lib
          sudo chown -R $(whoami) /usr/local/lib
        fi
      if: runner.os == 'macOS'
      shell: bash
      
    # cfr. https://github.com/pypa/cibuildwheel/issues/816
    - run: |
        sudo cp $RUNNER_TEMP/${{env.knitro}}/lib/* /usr/local/lib
      if: runner.os == 'macOS'
      shell: bash
      
    - run: ls $RUNNER_TEMP/${{env.knitro}} && ls $RUNNER_TEMP/${{env.knitro}}/lib
      shell: bash
    - run: echo "$PATH"
      shell: bash

    - run: echo "PATH=$env:RUNNER_TEMP\${{env.knitro}}\lib;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell
    - run: echo "LD_PRELOAD=$RUNNER_TEMP/${{env.knitro}}/lib/libiomp5.so"
      if: runner.os != 'Windows'
      shell: bash
    - run: echo "ARTELYS_LICENSE=$RUNNER_TEMP/artelys_lic_8325_casadi_2023-11-02.txt" >> $GITHUB_ENV
      shell: bash

    # SNOPT
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.snopt}}.zip
        token: ${{ inputs.token }}
    - run: unzip -q ${{env.snopt}}.zip -d $RUNNER_TEMP/snopt
      shell: bash
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: 'snopt7.lic'
        token: ${{ inputs.token }}

    - run: cp snopt7.lic $RUNNER_TEMP/snopt
      shell: bash

    - run: |
        echo "PATH=$env:RUNNER_TEMP\snopt;$env:PATH" >> $env:GITHUB_ENV
        echo "SNOPT_LICENSE=$env:RUNNER_TEMP\snopt\snopt7.lic" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell
    - run: |
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/snopt:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash
      
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: casadi/commercial_solvers
        file:  libgfortran.5.dylib
      if: runner.os == 'macOS'
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: casadi/commercial_solvers
        file:  libquadmath.0.dylib
      if: runner.os == 'macOS'
    - run: |
        sudo cp $RUNNER_TEMP/snopt/* /usr/local/lib
        sudo mkdir -p /opt/local/lib/libgcc/
        cp libgfortran.5.dylib $RUNNER_TEMP/snopt
        cp libquadmath.0.dylib $RUNNER_TEMP/snopt
        sudo ln -s $RUNNER_TEMP/snopt/libgfortran.5.dylib /opt/local/lib/libgcc/libgfortran.5.dylib
        sudo ln -s $RUNNER_TEMP/snopt/libquadmath.0.dylib /opt/local/lib/libgcc/libquadmath.0.dylib
      if: runner.os == 'macOS'
      shell: bash
    - run: |
        echo "SNOPT_LICENSE=$RUNNER_TEMP/snopt/snopt7.lic" >> $GITHUB_ENV
      if: runner.os != 'Windows'
      shell: bash
    - run: ls "$RUNNER_TEMP"
      shell: bash

    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: casadi/commercial_solvers
        file:  libgfortran.so.4
      if: runner.os == 'linux'
    - run: cp libgfortran.so.4 $RUNNER_TEMP/snopt/libgfortran.so.4
      shell: bash
      if: runner.os == 'linux'
      
    #  CPLEX
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.cplex}}${{env.cplex_suffix}}
        token: ${{ inputs.token }}
    - run: echo "CPLEX_VERSION=2211" >> $GITHUB_ENV
      shell: bash
    - run: |
          cat <<EOF > github_actions.properties
          INSTALLER_UI=silent
          LICENSE_ACCEPTED=TRUE
          USER_INSTALL_DIR=$RUNNER_TEMP/CPLEX
          INSTALLER_LOCALE=en
          CPLEX_STUDIO_FILE_ASSOCIATION=0
          CPLEX_STUDIO_PATH_UPDATE=0
          CPLEX_STUDIO_README=0
          CPLEX_STUDIO_IDE=0
          EOF
      shell: bash
    - run: |
          # Escape backslash in property file
          sed -i 's/\\/\//g' github_actions.properties
          echo "${{env.cplex}}${{env.cplex_suffix}} -f github_actions.properties" > install_cplex.bat
          cat install_cplex.bat
      if: runner.os == 'Windows'
      shell: bash
    - run: cat github_actions.properties
      shell: bash
    - run: |
        chmod +x ${{env.cplex}}${{env.cplex_suffix}}
        ./${{env.cplex}}${{env.cplex_suffix}} -f github_actions.properties
      if: runner.os == 'Linux'
      shell: bash
 
    - run: unzip -q ${{env.cplex}}.zip -d $RUNNER_TEMP/CPLEX
      shell: bash
      if: runner.os == 'Windows'

    - run: echo "PATH=$env:RUNNER_TEMP\CPLEX\cplex\bin\x64_win64;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell
    - run: ls $RUNNER_TEMP/CPLEX
      if: runner.os == 'Windows'
      shell: bash  
    - run: ls $RUNNER_TEMP/CPLEX/cplex
      if: runner.os == 'Windows'
      shell: bash  
    - run: ls $RUNNER_TEMP/CPLEX/cplex/bin
      if: runner.os == 'Windows'
      shell: bash
    - run: ls $RUNNER_TEMP/CPLEX/cplex/bin/x64_win64
      if: runner.os == 'Windows'
      shell: bash
    - run: ls $RUNNER_TEMP
      if: runner.os == 'Windows'
      shell: bash
    # Add to PATH
    - run: |
        ls $RUNNER_TEMP/CPLEX
        ls $RUNNER_TEMP/CPLEX/cplex/bin/x86-64_linux
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/CPLEX/cplex/bin/x86-64_linux:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash

    - run: |
            unzip ${{env.cplex}}.zip -d $RUNNER_TEMP
            pwd
            ls
            echo ${{ github.workspace }}
            $RUNNER_TEMP/cplex_studio${CPLEX_VERSION}-osx.app/contents/MacOS/cplex_studio${CPLEX_VERSION}-osx -f ${{ github.workspace }}/github_actions.properties
            ls $RUNNER_TEMP/CPLEX/cplex/bin/x86-64_osx/*
            sudo cp $RUNNER_TEMP/CPLEX/cplex/bin/x86-64_osx/* /usr/local/lib
      shell: bash
      if: runner.os == 'macOS' && runner.arch == 'X64'
    - run: |
            unzip ${{env.cplex}}.zip -d $RUNNER_TEMP
            pwd
            ls
            echo ${{ github.workspace }}
            $RUNNER_TEMP/cplex_studio${CPLEX_VERSION}-osx-arm64.app/contents/MacOS/cplex_studio${CPLEX_VERSION}-osx-arm64 -f ${{ github.workspace }}/github_actions.properties
            ls $RUNNER_TEMP/CPLEX/cplex/bin/arm64_osx/*
            sudo cp $RUNNER_TEMP/CPLEX/cplex/bin/arm64_osx/* /usr/local/lib
      shell: bash
      if: runner.os == 'macOS' && runner.arch == 'ARM64'
      
    - run: ls $RUNNER_TEMP/CPLEX
      shell: bash

    # Gurobi
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.gurobi}}
        token: ${{ inputs.token }}
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: gurobi.lic
        token: ${{ inputs.token }}
    - run: |
        echo "GUROBI_VERSION=100" >> $GITHUB_ENV
        mv gurobi.lic $RUNNER_TEMP/gurobi.lic
        echo "GRB_LICENSE_FILE=$RUNNER_TEMP/gurobi.lic" >> $GITHUB_ENV
      shell: bash
    - run: |
        tar -xzf ${{env.gurobi}} -C $RUNNER_TEMP
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/gurobi1001/linux64/lib/:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "GUROBI_VERSION=100" >> $GITHUB_ENV
        echo ""
        ls $RUNNER_TEMP
        ls $RUNNER_TEMP/gurobi1001/linux64/lib
      shell: bash
      if: runner.os == 'Linux'
    - run: |
        sudo installer -pkg ${{env.gurobi}} -target /
        ls /
        ls /Library/gurobi1001/macos_universal2/
      shell: bash
      if: runner.os == 'macOS'
    - run: |
        Start-Process "${{env.gurobi}}" -ArgumentList '/quiet /qn /norestart /log install.log' -Wait
      shell: pwsh
      if: runner.os == 'Windows'

    - run: echo "PATH=C:\gurobi1001\win64\bin;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell

    # HSL
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.hsl}}.zip
        token: ${{ inputs.token }}
    - run: unzip -q ${{env.hsl}}.zip -d $RUNNER_TEMP/hsl
      shell: bash

    # Add to PATH
    - run: |
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/hsl:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash

    # cfr. https://github.com/pypa/cibuildwheel/issues/816
    - run: |
        sudo cp $RUNNER_TEMP/hsl/* /usr/local/lib
      if: runner.os == 'macOS'
      shell: bash

    - run: echo "PATH=$env:RUNNER_TEMP\hsl;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell


    # BQPD
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.bqpd}}.zip
        token: ${{ inputs.token }}
    - run: unzip -q ${{env.bqpd}}.zip -d $RUNNER_TEMP/bqpd
      shell: bash

    # Add to PATH
    - run: |
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/bqpd:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash

    # cfr. https://github.com/pypa/cibuildwheel/issues/816
    - run: |
        sudo cp $RUNNER_TEMP/bqpd/* /usr/local/lib
      if: runner.os == 'macOS'
      shell: bash

    - run: echo "PATH=$env:RUNNER_TEMP\bqpd;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell


    # Worhp
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.worhp}}.zip
        token: ${{ inputs.token }}
      if: runner.os != 'macOS'
    - run: unzip -q ${{env.worhp}}.zip -d $RUNNER_TEMP/worhp
      if: runner.os != 'macOS'
      shell: bash

    - run: ls $RUNNER_TEMP/worhp
      if: runner.os != 'macOS'
      shell: bash

    - run: sudo apt install libopenblas0 -y #  libsuperlu5 
      if: runner.os == 'linux'
      shell: bash
  
    # Worhp license is mac-adress based, so we skip it on ci
    - run: |
        echo "SKIP_WORHP_TESTS=ON" >> $GITHUB_ENV
      shell: bash

    # Disable temporarily
    - run: |
        echo "SKIP_SNOPT_TESTS=ON" >> $GITHUB_ENV
      shell: bash

    # Disable temporarily
    - run: |
        echo "SKIP_GUROBI_TESTS=ON" >> $GITHUB_ENV
      shell: bash

    # Disable temporarily
    - run: |
        echo "SKIP_KNITRO_TESTS=ON" >> $GITHUB_ENV
      shell: bash

    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: casadi/commercial_solvers
        file:  libgfortran.so.3
        target: $RUNNER_TEMP/worhp/lib/libgfortran.so.3
      if: contains(matrix.arch, 'linux')

    # Add to PATH
    - run: |
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/worhp/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: runner.os == 'Linux'
      shell: bash

    - run: echo "PATH=$env:RUNNER_TEMP\worhp\bin;$env:PATH" >> $env:GITHUB_ENV
      if: runner.os == 'Windows'
      shell: powershell

    - run: echo "$LD_LIBRARY_PATH"
      if: runner.os == 'Linux'
      shell: bash

    # MadNLP / libMad
    # Pre-fetches the binaries that WITH_BUILD_MADNLP would otherwise pull at
    # configure time (see CMakeLists.txt:824-841 and :1379-1430). LIBMAD_URL is
    # the full per-platform download URL; LIBMAD_ASSET stays as the non-empty
    # "this platform is supported" marker the steps below gate on. macOS-X64 has
    # no build (CMakeLists.txt only ships apple-aarch64 under if(APPLE)) →
    # SKIP_MADNLP_TESTS=ON.
    #
    # Linux-X64 comes from casadi/polyglot's rolling `evergreen` release: a
    # libMad built in our controlled manylinux_2_28 container that bundles its
    # own libgomp/libjulia. This replaces the third-party apozharski build that
    # segfaulted during embedded-Julia init (libgomp mismatch). Windows/macOS
    # have no polyglot build yet → still apozharski v0.0.7-casadi.
    - run: |
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            echo "LIBMAD_ASSET=libMad-x64" >> $GITHUB_ENV
            echo "LIBMAD_URL=https://github.com/casadi/polyglot/releases/download/evergreen/libMad-x64.tar.gz" >> $GITHUB_ENV ;;
          Windows-X64)
            echo "LIBMAD_ASSET=libMad-windows-x86_64" >> $GITHUB_ENV
            echo "LIBMAD_URL=https://github.com/apozharski/libMad/releases/download/v0.0.7-casadi/libMad-windows-x86_64-v0.0.7-casadi.tar.gz" >> $GITHUB_ENV ;;
          macOS-ARM64)
            echo "LIBMAD_ASSET=libMad-apple-aarch64" >> $GITHUB_ENV
            echo "LIBMAD_URL=https://github.com/apozharski/libMad/releases/download/v0.0.7-casadi/libMad-apple-aarch64-v0.0.7-casadi.tar.gz" >> $GITHUB_ENV ;;
        esac
        # Embedded Julia (in libMad) probes /usr/local/cuda/compat on Linux
        # and can stall / fail on CI runners without a real CUDA driver.
        echo "JULIA_CUDA_USE_COMPAT=false" >> $GITHUB_ENV
      shell: bash

    - run: |
        mkdir -p "$RUNNER_TEMP/libMad"
        curl -fL -o "$RUNNER_TEMP/libMad/libMad.tar.gz" "$LIBMAD_URL"
        # GNU tar on Windows treats `D:\…` paths passed to -f / -C as a
        # host:path for an rmt remote tape device, and even with
        # --force-local the mixed-separator form fails on -C. Sidestep
        # both by `cd`-ing first and using a bare tarball name.
        if [ "$RUNNER_OS" = "Windows" ]; then
          ( cd "$RUNNER_TEMP/libMad" && tar -xf libMad.tar.gz )
        else
          tar -xf "$RUNNER_TEMP/libMad/libMad.tar.gz" -C "$RUNNER_TEMP/libMad"
        fi
        # Windows ships the import library as libMad.imp.lib (in bin/ for
        # current layouts, lib/ for older ones).  MSVC link-time consumers
        # look for Mad.lib in lib/, so always drop the alias there.
        if [ "$RUNNER_OS" = "Windows" ]; then
          mkdir -p "$RUNNER_TEMP/libMad/lib"
          for d in "$RUNNER_TEMP/libMad/bin" "$RUNNER_TEMP/libMad/lib"; do
            if [ -f "$d/libMad.imp.lib" ]; then
              cp "$d/libMad.imp.lib" "$RUNNER_TEMP/libMad/lib/Mad.lib"
              break
            fi
          done
        fi
        ls -R "$RUNNER_TEMP/libMad"
        # LIBMADDIR points to the extracted install root (parent of lib/ |
        # bin/ | include/).  No upstream env-var convention exists; this is
        # an internal-only export for downstream build scripts that want a
        # single handle on the pre-fetched libMad.
        echo "LIBMADDIR=$RUNNER_TEMP/libMad" >> $GITHUB_ENV
      if: env.LIBMAD_ASSET != ''
      shell: bash

    # No libMad build for this platform → skip MadNLP tests.
    - run: echo "SKIP_MADNLP_TESTS=ON" >> $GITHUB_ENV && echo "SKIP_CCOPT_TESTS=ON" >> $GITHUB_ENV
      if: env.LIBMAD_ASSET == ''
      shell: bash

    # Runtime discovery. Layout matches SHARED_LIBRARY_RELDIR in
    # CMakeLists.txt:1406-1407 (lib/ on Linux+macOS, bin/ on Windows).
    - run: echo "LD_LIBRARY_PATH=$RUNNER_TEMP/libMad/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: env.LIBMAD_ASSET != '' && runner.os == 'Linux'
      shell: bash
    # Recursive copy preserves the lib/julia/ subdir that libjulia.dylib
    # locates via RPATH @loader_path/julia. Plain `cp` errors on the
    # directory entry; flattening would also break RPATH resolution.
    # The macOS libMad tarball also ships share/julia/artifacts/<hash>/lib/
    # that libjulia reaches via @loader_path/../share/...; copy the share/
    # tree alongside so RPATH-relative resolution keeps working from
    # /usr/local/lib/. Linux tarball has no share/ — guard the copy.
    - run: |
        sudo cp -R $RUNNER_TEMP/libMad/lib/ /usr/local/lib/
        if [ -d "$RUNNER_TEMP/libMad/share" ]; then
          sudo cp -R "$RUNNER_TEMP/libMad/share/" /usr/local/share/
        fi
      if: env.LIBMAD_ASSET != '' && runner.os == 'macOS'
      shell: bash
    - run: echo "PATH=$env:RUNNER_TEMP\libMad\bin;$env:PATH" >> $env:GITHUB_ENV
      if: env.LIBMAD_ASSET != '' && runner.os == 'Windows'
      shell: powershell

    # Clarabel (real, from casadi/polyglot evergreen)
    # CasADi binaries build the clarabel plugin against the mockup
    # (WITH_MOCKUP_CLARABEL); here we drop the REAL libclarabel_c on
    # LD_LIBRARY_PATH so it shadows the shipped mockup at test time (same
    # SONAME libclarabel_c.so) -- the same mockup-build + real-at-test pattern
    # as libMad/onnxruntime. Only Linux x64/aarch64 have a polyglot build;
    # other OSes keep the (non-solving) mockup.
    - run: |
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)   echo "CLARABEL_ASSET=clarabel-x64"     >> $GITHUB_ENV ;;
          Linux-ARM64) echo "CLARABEL_ASSET=clarabel-aarch64" >> $GITHUB_ENV ;;
        esac
      shell: bash

    - run: |
        mkdir -p "$RUNNER_TEMP/clarabel"
        curl -fL -o "$RUNNER_TEMP/clarabel/clarabel.tar.gz" \
          "https://github.com/casadi/polyglot/releases/download/evergreen/${CLARABEL_ASSET}.tar.gz"
        tar -xf "$RUNNER_TEMP/clarabel/clarabel.tar.gz" -C "$RUNNER_TEMP/clarabel"
        ls -R "$RUNNER_TEMP/clarabel" | head -40
        echo "CLARABELDIR=$RUNNER_TEMP/clarabel" >> $GITHUB_ENV
      if: env.CLARABEL_ASSET != ''
      shell: bash

    - run: echo "LD_LIBRARY_PATH=$RUNNER_TEMP/clarabel/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: env.CLARABEL_ASSET != '' && runner.os == 'Linux'
      shell: bash

    # Mosek
    # Tarballs / zip + license live in the jgillis/restricted release alongside
    # knitro et al. No mac-x64 build is shipped, so all mosek steps are gated
    # on env.mosek (set by the variable-mapper above).
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.mosek}}${{env.mosek_suffix}}
        token: ${{ inputs.token }}
      if: env.mosek != ''
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: 'mosek.lic'
        token: ${{ inputs.token }}
      if: env.mosek != ''

    - run: |
        mkdir -p "$RUNNER_TEMP/mosek_root"
        tar -xf ${{env.mosek}}${{env.mosek_suffix}} -C "$RUNNER_TEMP/mosek_root"
        # Tarball roots at mosek/<version>/...; capture the version directory name
        # for path construction.  MOSEK_VERSION itself is unused on Linux/Mac
        # (only Windows needs it, where the mosek adaptor reads it as a DLL suffix).
        mosek_dir=$(ls "$RUNNER_TEMP/mosek_root/mosek")
        echo "MOSEK_VERSION_DIR=$mosek_dir" >> $GITHUB_ENV
        # MOSEKDIR is Mosek's conventional install root (parent of bin/), used
        # by CMake's find logic and by downstream build scripts.
        echo "MOSEKDIR=$RUNNER_TEMP/mosek_root/mosek/$mosek_dir/tools/platform/${{env.mosek_platform}}" >> $GITHUB_ENV
        mv mosek.lic "$RUNNER_TEMP/mosek.lic"
        echo "MOSEKLM_LICENSE_FILE=$RUNNER_TEMP/mosek.lic" >> $GITHUB_ENV
      if: env.mosek != '' && runner.os != 'Windows'
      shell: bash
    - run: |
        unzip -q ${{env.mosek}}${{env.mosek_suffix}} -d "$RUNNER_TEMP/mosek_root"
        # Mosek's Windows install lays out mosek/<dir-version>/...; the DLL
        # inside is mosek64_<dll-suffix>.dll.  The two strings differ in
        # separator (e.g. dir 11.1 vs DLL suffix 11_1).  Capture both:
        # MOSEK_VERSION_DIR drives path construction below, MOSEK_VERSION
        # is read by the mosek mockup adaptor on Windows to form the
        # mosek64_${MOSEK_VERSION}.dll filename it LoadLibrarys.
        mosek_dir=$(ls "$RUNNER_TEMP/mosek_root/mosek")
        echo "MOSEK_VERSION_DIR=$mosek_dir" >> $GITHUB_ENV
        echo "MOSEK_VERSION=${mosek_dir//./_}" >> $GITHUB_ENV
        # MOSEKDIR is Mosek's conventional install root (parent of bin/).
        echo "MOSEKDIR=$RUNNER_TEMP/mosek_root/mosek/$mosek_dir/tools/platform/${{env.mosek_platform}}" >> $GITHUB_ENV
        mv mosek.lic "$RUNNER_TEMP/mosek.lic"
        echo "MOSEKLM_LICENSE_FILE=$RUNNER_TEMP/mosek.lic" >> $GITHUB_ENV
      if: env.mosek != '' && runner.os == 'Windows'
      shell: bash

    # Runtime discovery — bin/ holds both binaries and the shared lib for all
    # platforms (libmosek64.so / libmosek64.dylib / mosek64_<ver>.dll).
    - run: echo "LD_LIBRARY_PATH=$RUNNER_TEMP/mosek_root/mosek/${MOSEK_VERSION_DIR}/tools/platform/${{env.mosek_platform}}/bin:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: env.mosek != '' && runner.os == 'Linux'
      shell: bash
    # cfr. https://github.com/pypa/cibuildwheel/issues/816
    - run: sudo cp $RUNNER_TEMP/mosek_root/mosek/${MOSEK_VERSION_DIR}/tools/platform/${{env.mosek_platform}}/bin/*.dylib /usr/local/lib
      if: env.mosek != '' && runner.os == 'macOS'
      shell: bash
    - run: echo "PATH=$env:RUNNER_TEMP\mosek_root\mosek\$env:MOSEK_VERSION_DIR\tools\platform\${{env.mosek_platform}}\bin;$env:PATH" >> $env:GITHUB_ENV
      if: env.mosek != '' && runner.os == 'Windows'
      shell: powershell

    # Windows ships only the versioned import library (mosek64_<ver>.lib).
    # The runtime DLL is resolved by the mockup adaptor via $MOSEK_VERSION,
    # but link-time consumers expect an unversioned mosek64.lib — drop a
    # copy next to the versioned file.  (The matching .dll alias is NOT
    # needed: the adaptor does that indirection at runtime.)
    - run: |
        $bin = "$env:RUNNER_TEMP\mosek_root\mosek\$env:MOSEK_VERSION_DIR\tools\platform\${{env.mosek_platform}}\bin"
        Get-ChildItem -Path $bin -Filter 'mosek64_*.lib' | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName (Join-Path $bin 'mosek64.lib') -Force }
        Get-ChildItem $bin
      if: env.mosek != '' && runner.os == 'Windows'
      shell: powershell

    # No mosek build for this platform (e.g. macOS-X64) → tell the test suite to skip.
    - run: echo "SKIP_MOSEK_TESTS=ON" >> $GITHUB_ENV
      if: env.mosek == ''
      shell: bash

    # Xpress
    # Self-contained zips (bin/ + lib/ at archive root); license is bundled as
    # bin/xpauth.xpr — no separate .lic. Only Linux + both macOS arches ship;
    # gated on env.xpress.
    - uses: jgillis/fetch-gh-release-asset@codex/bump-runtime-node24
      with:
        repo: 'jgillis/restricted'
        file: ${{env.xpress}}.zip
        token: ${{ inputs.token }}
      if: env.xpress != ''
    - run: |
        mkdir -p "$RUNNER_TEMP/xpress"
        unzip -q ${{env.xpress}}.zip -d "$RUNNER_TEMP/xpress"
        # XPRESSDIR is the install root; XPRESS must point at the bin/
        # subdir that holds xpauth.xpr (matches FICO's xpvars.sh).
        echo "XPRESSDIR=$RUNNER_TEMP/xpress" >> $GITHUB_ENV
        echo "XPRESS=$RUNNER_TEMP/xpress/bin" >> $GITHUB_ENV
        ls "$RUNNER_TEMP/xpress/lib"
      if: env.xpress != ''
      shell: bash

    - run: echo "LD_LIBRARY_PATH=$RUNNER_TEMP/xpress/lib:$RUNNER_TEMP/xpress/lib/thirdparty:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: env.xpress != '' && runner.os == 'Linux'
      shell: bash
    # cfr. https://github.com/pypa/cibuildwheel/issues/816
    - run: |
        sudo cp $RUNNER_TEMP/xpress/lib/*.dylib /usr/local/lib
        if [ -d "$RUNNER_TEMP/xpress/lib/thirdparty" ]; then
          sudo cp $RUNNER_TEMP/xpress/lib/thirdparty/*.dylib /usr/local/lib 2>/dev/null || true
        fi
      if: env.xpress != '' && runner.os == 'macOS'
      shell: bash

    # No xpress build for this platform (e.g. Windows-X64) → tell the test suite to skip.
    - run: echo "SKIP_XPRESS_TESTS=ON" >> $GITHUB_ENV
      if: env.xpress == ''
      shell: bash

    # ONNX Runtime (public, MIT). Provide the real runtime so the shipped wheels'
    # onnxruntime plugin runs against it instead of the bundled mockup. Skipped for python
    # builds (skip_onnxruntime=true): there the plugin reuses the pip `onnxruntime` lib
    # in-process (matching soname). Kept for matlab/octave, which have no pip onnxruntime.
    - run: |
        env -u LD_LIBRARY_PATH -u DYLD_LIBRARY_PATH curl -fL -o "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" \
          "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/${{env.onnxruntime}}.${{env.onnxruntime_ext}}"
        tar -xzf "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" -C "$RUNNER_TEMP"
        ls "$RUNNER_TEMP/${{env.onnxruntime}}/lib"
        echo "LD_LIBRARY_PATH=$RUNNER_TEMP/${{env.onnxruntime}}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      if: env.onnxruntime != '' && runner.os == 'Linux' && inputs.skip_onnxruntime != 'true'
      shell: bash
    - run: |
        env -u LD_LIBRARY_PATH -u DYLD_LIBRARY_PATH curl -fL -o "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" \
          "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/${{env.onnxruntime}}.${{env.onnxruntime_ext}}"
        tar -xzf "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" -C "$RUNNER_TEMP"
        ls "$RUNNER_TEMP/${{env.onnxruntime}}/lib"
        if [ ! -d "/usr/local/lib" ]; then sudo mkdir -p /usr/local/lib && sudo chown -R $(whoami) /usr/local/lib; fi
        # *.dylib (not *.dylib*) avoids the libonnxruntime.*.dylib.dSYM debug DIRECTORY
        sudo cp "$RUNNER_TEMP/${{env.onnxruntime}}/lib/"*.dylib /usr/local/lib
      if: env.onnxruntime != '' && runner.os == 'macOS' && inputs.skip_onnxruntime != 'true'
      shell: bash
    - run: |
        env -u LD_LIBRARY_PATH -u DYLD_LIBRARY_PATH curl -fL -o "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" \
          "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/${{env.onnxruntime}}.${{env.onnxruntime_ext}}"
        unzip -q "$RUNNER_TEMP/${{env.onnxruntime}}.${{env.onnxruntime_ext}}" -d "$RUNNER_TEMP"
        ls "$RUNNER_TEMP/${{env.onnxruntime}}/lib"
      if: env.onnxruntime != '' && runner.os == 'Windows' && inputs.skip_onnxruntime != 'true'
      shell: bash
    - run: echo "PATH=$env:RUNNER_TEMP\${{env.onnxruntime}}\lib;$env:PATH" >> $env:GITHUB_ENV
      if: env.onnxruntime != '' && runner.os == 'Windows' && inputs.skip_onnxruntime != 'true'
      shell: powershell
